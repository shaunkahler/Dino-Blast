<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Dino Blast</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        html,
        body {
            margin: 0px;
            padding: 0px;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
            position: fixed;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #glcanvas {
            margin: 0px;
            padding: 0px;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
            outline: none;
        }

        #controls {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            z-index: 10;
            touch-action: none;
        }

        .d-pad, .action-buttons {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 15px;
        }

        .d-pad { left: 20px; }
        .action-buttons { right: 20px; }

        .btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 32px;
            user-select: none;
            -webkit-user-select: none;
        }

        #fullscreen-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            color: white;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            cursor: pointer;
            user-select: none;
        }
        
        #fullscreen-btn:active {
            background: rgba(255, 255, 255, 0.6);
        }
        
        .btn:active {
            background: rgba(255, 255, 255, 0.6);
        }

        /* Portrait (Vertical) - Game Boy Style */
        @media (orientation: portrait) {
            .mobile-controls-active #game-container {
                flex-direction: column;
            }
            .mobile-controls-active #glcanvas {
                height: 50%;
                border-bottom: 2px solid #333;
            }
            .mobile-controls-active #controls {
                display: block;
                position: relative;
                height: 50%;
                background: #8e8e8e; /* Game Boy grey */
            }
            .mobile-controls-active .btn {
                background: #990000;
                border: 2px solid #550000;
                color: #ffcccc;
            }
            .mobile-controls-active .d-pad .btn {
                background: #333;
                border: 2px solid #111;
                border-radius: 10px;
            }
        }

        /* Landscape - Overlay Style */
        @media (orientation: landscape) {
            .mobile-controls-active #game-container {
                display: flex;
                align-items: center;
                justify-content: center;
                background: #000;
            }
            .mobile-controls-active #glcanvas {
                width: auto;
                height: 88%;
                max-width: calc(100vw - 260px); /* Ensures canvas never overlaps buttons on the left/right */
                aspect-ratio: 16 / 9;
                border: 2px solid #222;
                border-radius: 8px;
                box-shadow: 0 0 20px rgba(0,0,0,0.5);
                z-index: 5;
            }
            .mobile-controls-active #controls {
                display: block;
                position: absolute;
                background: transparent;
                height: 100%;
                width: 100%;
                pointer-events: none; /* Let touches pass through to canvas if in middle */
            }
            .mobile-controls-active .d-pad,
            .mobile-controls-active .action-buttons {
                bottom: 50%;
                transform: translateY(50%);
                pointer-events: auto; /* Re-enable touches for buttons */
            }
            .mobile-controls-active .d-pad { left: 10px; }
            .mobile-controls-active .action-buttons { right: 10px; }
        }
    </style>
</head>

<body>
    <div id="game-container">
        <canvas id="glcanvas" tabindex='1'></canvas>
        <div id="fullscreen-btn">⛶</div>
        <div id="controls">
            <div class="d-pad">
                <div class="btn" id="btn-left">←</div>
                <div class="btn" id="btn-right">→</div>
            </div>
            <div class="action-buttons">
                <div class="btn" id="btn-fire">B</div>
                <div class="btn" id="btn-jump">A</div>
            </div>
        </div>
    </div>
    
    <script>
        // Fullscreen logic
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        // Check if device is mobile (touch screen)
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window);
        
        if (isMobile) {
            document.body.classList.add('mobile-controls-active');
            
            const canvas = document.getElementById("glcanvas");
            
            function sendKey(type, code, keyCode) {
                const event = new KeyboardEvent(type, {
                    code: code,
                    key: code === "Space" ? " " : code.replace("Key", "").replace("Arrow", ""),
                    keyCode: keyCode,
                    which: keyCode,
                    bubbles: true,
                    cancelable: true
                });
                canvas.dispatchEvent(event);
                window.dispatchEvent(event);
            }

            function bindBtn(id, code, keyCode) {
                const btn = document.getElementById(id);
                
                // Track interaction state
                let isPressed = false;

                const startHandler = (e) => {
                    if (isPressed) return;
                    isPressed = true;
                    
                    // CRITICAL: Unblock audio context IMMEDIATELY on the very first touch
                    unblock();
                    
                    if (e.cancelable) e.preventDefault();
                    sendKey('keydown', code, keyCode);
                };

                const endHandler = (e) => {
                    if (!isPressed) return;
                    isPressed = false;
                    if (window.mq_audio_unlocked && e.cancelable) e.preventDefault();
                    sendKey('keyup', code, keyCode);
                };

                // Listen to both Touch and Mouse to cover all mobile/tablet edge cases
                btn.addEventListener('touchstart', startHandler, { passive: false });
                btn.addEventListener('touchend', endHandler, { passive: false });
                btn.addEventListener('touchcancel', endHandler, { passive: false });
                
                btn.addEventListener('mousedown', startHandler);
                btn.addEventListener('mouseup', endHandler);
                btn.addEventListener('mouseleave', endHandler);
            }

            bindBtn('btn-left', 'ArrowLeft', 37);
            bindBtn('btn-right', 'ArrowRight', 39);
            bindBtn('btn-jump', 'Space', 32);
            bindBtn('btn-fire', 'KeyJ', 74);
        }
    </script>
    
    <!-- Miniquad library required to bootstrap WASM -->
    <script src="mq_js_bundle.js"></script>
    <script>
        // Load the actual wasm file with a cache buster and explicit audio context resume on click
        load("dino_blast.wasm?v=" + new Date().getTime());
        
        // Global listener to resume audio context if it's stuck in suspended state
        let audio_unblocked = false;
        function unblock() {
            if (audio_unblocked) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                const context = new AudioContext();
                // Create a silent buffer and play it to force-resume the audio session
                const buffer = context.createBuffer(1, 1, 22050);
                const source = context.createBufferSource();
                source.buffer = buffer;
                source.connect(context.destination);
                source.start(0);
                if (context.state === 'suspended') {
                    context.resume();
                }
                audio_unblocked = true;
            }
        }
        
        ['click', 'keydown', 'touchstart', 'mousedown', 'touchend'].forEach(evt => {
            document.addEventListener(evt, unblock, { once: true });
        });
    </script>
</body>

</html>
